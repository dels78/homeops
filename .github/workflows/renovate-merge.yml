name: Renovate Auto-Merge

on:
  workflow_run:
    workflows: ["Renovate Dependency Evaluator"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Find safe-to-merge Renovate PRs
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --repo "${{ github.repository }}" \
            --state open --label "safe-to-merge" \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("renovate/"))]')
          COUNT=$(echo "$PRS" | jq 'length')
          echo "Found ${COUNT} safe-to-merge Renovate PRs"
          echo "prs=$PRS" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Merge safe PRs
        if: steps.find-prs.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS: ${{ steps.find-prs.outputs.prs }}
        run: |
          echo "$PRS" | jq -r '.[].number' | while read PR_NUMBER; do
            echo "=== Processing PR #${PR_NUMBER} ==="

            # Skip DO NOT MERGE
            LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
            if echo "$LABELS" | grep -q "DO NOT MERGE"; then
              echo "Skipping — DO NOT MERGE label"
              continue
            fi

            # Check CI status (checks already ran — PR has been open)
            CHECKS=$(gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" --json name,bucket 2>/dev/null || echo "[]")
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.bucket == "fail")] | length')

            if [ "$FAILED" -gt 0 ]; then
              FAILED_NAMES=$(echo "$CHECKS" | jq -r '[.[] | select(.bucket == "fail") | .name] | join(", ")')
              echo "::warning::PR #${PR_NUMBER} has failed checks: ${FAILED_NAMES}"
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
                --remove-label "safe-to-merge" --add-label "needs-human-review"
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
                --body "## Auto-Merge Blocked

          CI checks failed: ${FAILED_NAMES}

          Moved to \`needs-human-review\`. The evaluator will re-assess on the next scheduled run."
              continue
            fi

            # Merge
            echo "Merging PR #${PR_NUMBER}..."
            gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash --delete-branch \
              --body "Auto-merged by Renovate Evaluator after AI safety assessment and CI validation." \
              || echo "::warning::Failed to merge PR #${PR_NUMBER} (may need branch protection approval)"
          done
