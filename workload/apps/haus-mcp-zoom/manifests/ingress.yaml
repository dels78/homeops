apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: haus-mcp-zoom
  namespace: haus-mcp-zoom
  labels:
    app.kubernetes.io/name: haus-mcp-zoom
    app.kubernetes.io/component: server
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: mcp-zoom.delisle.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: haus-mcp-zoom
                port:
                  number: 8000
